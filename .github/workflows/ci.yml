---
name: Tests

on:
  push:
    branches: [master]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  NO_STD_TARGET: thumbv6m-none-eabi

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache Dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --all-features

      - name: Prepare no_std target
        run: rustup target add $NO_STD_TARGET

      - name: Build with no_std and no alloc
        run: cargo build --verbose --release --target $NO_STD_TARGET --no-default-features

      - name: Build with no_std
        run: cargo build --verbose --release --target $NO_STD_TARGET --no-default-features --features alloc
